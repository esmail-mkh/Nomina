name: Build & Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0). Will be tagged v<version>.'
        required: true
        type: string
      prerelease:
        description: 'Mark this release as a pre-release?'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            ext: zip
            artifact_glob: 'dist/Nomina'
            archive_name: Nomina-v${{ inputs.version }}-windows-x64
            upx_asset_pattern: 'win64\.zip$'

          - os: ubuntu-latest
            label: linux-x64
            ext: tar.gz
            artifact_glob: 'dist/Nomina'
            archive_name: Nomina-v${{ inputs.version }}-linux-x64
            upx_asset_pattern: 'amd64_linux\.tar\.xz$'

          - os: ubuntu-24.04-arm
            label: linux-arm64
            ext: tar.gz
            artifact_glob: 'dist/Nomina'
            archive_name: Nomina-v${{ inputs.version }}-linux-arm64
            upx_asset_pattern: 'arm64_linux\.tar\.xz$'

          - os: macos-latest
            label: macos-arm64
            ext: zip
            artifact_glob: 'dist/Nomina.app'
            archive_name: Nomina-v${{ inputs.version }}-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Linux system deps
        if: startsWith(matrix.label, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 libgtk-3-dev \
            libwebkit2gtk-4.1-0 libwebkit2gtk-4.1-dev \
            gir1.2-webkit2-4.1 \
            pkg-config python3-gi gir1.2-gtk-3.0 \
            libgirepository1.0-dev

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pillow
          python -c "import PIL, PyInstaller; print('deps ok')"

      - name: Install PyGObject (Linux only)
        if: startsWith(matrix.label, 'linux')
        run: python -m pip install "PyGObject<3.52"

      - name: Generate platform icons
        run: python build/make_icons.py

      - name: Install latest UPX (Windows)
        if: startsWith(matrix.label, 'windows')
        shell: pwsh
        run: |
          $latest = Invoke-RestMethod -Uri "https://api.github.com/repos/upx/upx/releases/latest" `
                     -Headers @{ "User-Agent" = "gh-actions" }
          $pattern = "${{ matrix.upx_asset_pattern }}"
          $asset = $latest.assets | Where-Object { $_.name -match $pattern } | Select-Object -First 1
          if (-not $asset) { throw "Could not find UPX asset matching $pattern" }
          Write-Host "Downloading $($asset.name) ($($latest.tag_name))"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath upx-tmp
          $upxExe = Get-ChildItem upx-tmp -Recurse -Filter upx.exe | Select-Object -First 1
          $upxDir = Split-Path $upxExe.FullName -Parent
          Add-Content $env:GITHUB_PATH $upxDir
          Add-Content $env:GITHUB_ENV "UPX_DIR=$upxDir"
          & $upxExe.FullName --version

      - name: Install latest UPX (Linux)
        if: startsWith(matrix.label, 'linux')
        run: |
          latest=$(curl -s https://api.github.com/repos/upx/upx/releases/latest)
          pattern="${{ matrix.upx_asset_pattern }}"
          url=$(echo "$latest" | grep -oE "\"browser_download_url\": *\"[^\"]*${pattern}\"" | head -n1 | sed 's/.*"\(http[^"]*\)"/\1/')
          tag=$(echo "$latest" | grep -oE '"tag_name": *"[^"]*"' | head -n1 | cut -d'"' -f4)
          if [ -z "$url" ]; then
            echo "Warning: no UPX asset matching $pattern — skipping UPX"
            exit 0
          fi
          echo "Downloading UPX $tag from $url"
          curl -L "$url" -o upx.tar.xz
          mkdir -p upx-tmp && tar -xf upx.tar.xz -C upx-tmp --strip-components=1
          upx_dir="$PWD/upx-tmp"
          echo "$upx_dir" >> $GITHUB_PATH
          echo "UPX_DIR=$upx_dir" >> $GITHUB_ENV
          "$upx_dir/upx" --version

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ -n "${UPX_DIR:-}" ]; then
            echo "Building with UPX compression (UPX_DIR=$UPX_DIR)"
            pyinstaller build/nomina.spec --noconfirm --clean --upx-dir "$UPX_DIR"
          else
            echo "Building without UPX (macOS or no UPX available)"
            pyinstaller build/nomina.spec --noconfirm --clean
          fi

      - name: Package (Windows — zip via PowerShell)
        if: startsWith(matrix.label, 'windows')
        shell: pwsh
        run: |
          $archiveName = "${{ matrix.archive_name }}"
          Compress-Archive -Path "dist\Nomina" -DestinationPath "$archiveName.zip" -Force
          Write-Host "Created: $archiveName.zip"

      - name: Package (macOS — zip via ditto)
        if: matrix.label == 'macos-arm64'
        shell: bash
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Nomina.app" "../${{ matrix.archive_name }}.zip"

      - name: Package (Linux — tar.gz)
        if: matrix.ext == 'tar.gz'
        run: |
          cd dist
          tar -czf "../${{ matrix.archive_name }}.tar.gz" Nomina

      - name: Install Inno Setup (Windows only)
        if: startsWith(matrix.label, 'windows')
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          echo "C:\Program Files (x86)\Inno Setup 6" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows Installer
        if: startsWith(matrix.label, 'windows')
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $isccPath)) {
            $isccPath = Get-Command iscc.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source
            if (-not $isccPath) { throw "ISCC.exe not found" }
          }
          Write-Host "Running Inno Setup with AppVersion=$version"
          & $isccPath build\installer.iss /DAppVersion=$version /Q
          $installerName = "Nomina-Setup-v$version.exe"
          if (-not (Test-Path "dist\$installerName")) {
            throw "Installer was not created at dist\$installerName"
          }
          Write-Host "Installer created: dist\$installerName"

      - name: Upload installer artifact (Windows only)
        if: startsWith(matrix.label, 'windows')
        uses: actions/upload-artifact@v4
        with:
          name: Nomina-Setup-v${{ inputs.version }}
          path: dist/Nomina-Setup-v${{ inputs.version }}.exe
          if-no-files-found: error
          retention-days: 7

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}.${{ matrix.ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" \) -exec cp {} release-files/ \;
          ls -lh release-files

      - name: Generate checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Nomina v${{ inputs.version }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          body: |
            ## ✦ Nomina v${{ inputs.version }}

            Advanced batch file & folder renamer — built with Python + pywebview.

            ### 📦 Downloads

            | Platform | Architecture | File |
            |---|---|---|
            | 🪟 **Windows Installer** ⭐ | x64 | `Nomina-Setup-v${{ inputs.version }}.exe` |
            | 🪟 **Windows Portable**   | x64 | `Nomina-v${{ inputs.version }}-windows-x64.zip` |
            | 🐧 **Linux**              | x64 (amd64) | `Nomina-v${{ inputs.version }}-linux-x64.tar.gz` |
            | 🐧 **Linux**              | ARM64 (Raspberry Pi) | `Nomina-v${{ inputs.version }}-linux-arm64.tar.gz` |
            | 🍎 **macOS (Apple Silicon)** | ARM64 (M1/M2/M3/M4) | `Nomina-v${{ inputs.version }}-macos-arm64.zip` |

            > 💡 **Windows users:** Use the **Installer** (`.exe`) for a standard installation with Start Menu & Desktop shortcuts and automatic uninstaller. Use the **Portable** (`.zip`) if you prefer a no-install, run-from-anywhere version.
            > 💡 **macOS Intel users:** The Apple Silicon version runs on Intel Macs via Rosetta 2.

            SHA-256 checksums are in `SHA256SUMS.txt`.

            ### 🚀 Run

            - **Windows (Installer)** — run `Nomina-Setup-v${{ inputs.version }}.exe`, follow the wizard, launch from Start Menu
            - **Windows (Portable)** — unzip and run `Nomina.exe`
            - **Linux (x64)** — `tar -xzf` and run `./Nomina/Nomina`
            - **Linux (ARM64)** — same as above, on Raspberry Pi 4/5 or ARM servers
            - **macOS** — unzip and drag `Nomina.app` to Applications

            > On macOS first launch, right-click → *Open* (unsigned build).

            ### 📋 System requirements

            - **Windows**: Windows 10/11 x64, WebView2 (preinstalled on Win 11)
            - **Linux x64**: Any modern distro with `libwebkit2gtk-4.1` and `libgtk-3`
            - **Linux ARM64**: Raspberry Pi OS (64-bit), Ubuntu 22.04+ ARM64
            - **macOS**: macOS 11 (Big Sur) or newer (Apple Silicon native, Intel via Rosetta 2)
          files: |
            release-files/*.zip
            release-files/*.tar.gz
            release-files/*.exe
            release-files/SHA256SUMS.txt
